version: '3.8'

services:
  bot:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
      - NODE_ENV=production
    ports:
      - "3000:3000"
    command: npm start
    restart: always
